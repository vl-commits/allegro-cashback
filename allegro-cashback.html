  pl: {
    title: 'Cashback z zamówień na Allegro PL',
    placeholder: 'Wpisz nazwę kategorii lub produktu…',
    thCat: 'Kategoria',

    found: function(v, t) { return 'Znaleziono: ' + v + ' z ' + t + ' wierszy'; }
  },
  ua: {

    placeholder: 'Введіть назву категорії або товару…',

    thRate: 'Ставка кешбеку',
    noResults: 'Результатів не знайдено.',
    found: function(v, t) { return 'Знайдено: ' + v + ' з ' + t + ' рядків'; }
  }
};

function renderTable(data) {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  var lastCat = null;
  for (var i = 0; i < data.length; i++) {
    var row = data[i];
    var tr = document.createElement('tr');
    if (row[0] !== lastCat) {
      tr.style.borderTop = '2px solid #ffe0cc';
      lastCat = row[0];
    }
    var td0 = document.createElement('td');
    var td1 = document.createElement('td');
    var td2 = document.createElement('td');
    td0.textContent = row[0].replace(/^"|"$/g, '');
    td1.textContent = row[1];
    td2.textContent = row[2];
    tr.appendChild(td0);
    tr.appendChild(td1);
    tr.appendChild(td2);
    tbody.appendChild(tr);
  }
}

function setLang(lang) {
  currentLang = lang;
  var t = i18n[lang];
  document.getElementById('headerTitle').textContent = t.title;
  document.getElementById('searchInput').placeholder = t.placeholder;
  document.getElementById('thCat').textContent = t.thCat;
  document.getElementById('thSub').textContent = t.thSub;
  document.getElementById('thRate').textContent = t.thRate;
  document.getElementById('noResults').textContent = t.noResults;
  document.getElementById('btnPL').className = 'lang-btn' + (lang === 'pl' ? ' active' : '');
  document.getElementById('btnUA').className = 'lang-btn' + (lang === 'ua' ? ' active' : '');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  renderTable(lang === 'pl' ? dataPL : dataUA);
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  var tbody = document.getElementById('tableBody');
  var rows = tbody.querySelectorAll('tr');
  var visible = 0;
  var t = i18n[currentLang];

  for (var i = 0; i < rows.length; i++) {
    var tr = rows[i];
    var combined = (tr.children[0].textContent + ' ' + tr.children[1].textContent + ' ' + tr.children[2].textContent).toLowerCase();
    if (!q || combined.indexOf(q) !== -1) {
      tr.classList.remove('hidden');
      visible++;
    } else {
      tr.classList.add('hidden');
    }
  }

  document.getElementById('noResults').style.display = (visible === 0) ? 'block' : 'none';
  document.getElementById('searchCount').textContent = q ? t.found(visible, rows.length) : '';
});

// Init
setLang('pl');
