    border-collapse: separate;
    border-spacing: 0;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;

  thead th:nth-child(3) { width: 30%; }

    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fff5ef; }
  tbody tr.hidden { display: none; }

    line-height: 1.55;

    padding: 0 2px;

// Render rows
const tbody = document.getElementById('tableBody');
let lastCat = null;
data.forEach((row, i) => {
  const tr = document.createElement('tr');
  if (row[0] !== lastCat) {
    tr.setAttribute('data-cat-start', '1');
    lastCat = row[0];
  }
  tr.dataset.cat = row[0].toLowerCase();
  tr.dataset.sub = row[1].toLowerCase();
  tr.dataset.rate = row[2].toLowerCase();
  tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td>`;
  tbody.appendChild(tr);
});

// Search
const input = document.getElementById('searchInput');
const countEl = document.getElementById('searchCount');
const noResults = document.getElementById('noResults');
const rows = tbody.querySelectorAll('tr');

function escapeReg(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + escapeReg(query) + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

input.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  let visible = 0;

  rows.forEach(tr => {
    const cat = tr.children[0].textContent;
    const sub = tr.children[1].textContent;
    const rate = tr.children[2].textContent;
    const combined = (cat + ' ' + sub + ' ' + rate).toLowerCase();

    if (!q || combined.includes(q)) {
      tr.classList.remove('hidden');
      visible++;
      if (q) {
        tr.children[0].innerHTML = highlight(cat, this.value.trim());
        tr.children[1].innerHTML = highlight(sub, this.value.trim());
        tr.children[2].innerHTML = highlight(rate, this.value.trim());
      } else {
        tr.children[0].textContent = cat;
        tr.children[1].textContent = sub;
        tr.children[2].textContent = rate;
      }
    } else {
      tr.classList.add('hidden');
    }
  });

  noResults.style.display = (visible === 0) ? 'block' : 'none';
  countEl.textContent = q ? `Znaleziono: ${visible} z ${rows.length} wierszy` : '';
});
</script>
